name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# GitHub Pages へのデプロイに必要な権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行制限（デプロイの競合防止）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # CI: テストと静的解析
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: example-001/package-lock.json

      - name: Install dependencies
        working-directory: example-001
        run: npm ci

      - name: Run Linter
        working-directory: example-001
        run: npm run lint

      - name: Install Playwright Browsers
        working-directory: example-001
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: example-001
        run: npm test

      - name: Upload Playwright report (on failure)
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: example-001/playwright-report/
          retention-days: 30


