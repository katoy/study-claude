name: ToDo App CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'todo-app/**'
      - '.github/workflows/todo-app-ci-cd.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'todo-app/**'

# GitHub Pages へのデプロイに必要な権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # CI: テストと静的解析
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'todo-app/package-lock.json'

      - name: Install dependencies
        working-directory: todo-app
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: todo-app
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: todo-app
        run: npm test

      - name: Upload Playwright report (on failure)
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: todo-app/playwright-report/
          retention-days: 30

  # CD: GitHub Pages へのデプロイ
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}todo-app/
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # リポジトリルート全体をアップロード
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
