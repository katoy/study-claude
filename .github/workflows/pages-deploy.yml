name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

# GitHub Pages へのデプロイに必要な権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行制限
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: todo-app2/package-lock.json

      - name: Install dependencies
        working-directory: todo-app2
        run: npm ci

      - name: Build todo-app2
        working-directory: todo-app2
        run: npm run build

      - name: Build pdflabel (if exists)
        if: hashFiles('pdflabel/dist/index.html') != ''
        working-directory: pdflabel
        run: |
          npm ci 2>/dev/null || true
          npm run build 2>/dev/null || true

      - name: Prepare deployment structure
        run: |
          mkdir -p _deploy/todo-app2
          mkdir -p _deploy/pdflabel
          
          # Copy todo-app2 build
          if [ -f "todo-app2/dist/index.html" ]; then
            cp todo-app2/dist/index.html _deploy/todo-app2/index.html
          fi
          
          # Copy pdflabel build if exists
          if [ -f "pdflabel/dist/index.html" ]; then
            cp pdflabel/dist/index.html _deploy/pdflabel/index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
