name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# GitHub Pages デプロイ用のパーミッション設定
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行制限
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 1. ビルド、テスト、静的解析ジョブ
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Formatter Check
        run: npm run format

      - name: Run Tests with 100% Coverage Check
        run: npm run test:coverage

      - name: Build Application (Single HTML)
        run: npm run build

      - name: Upload Pages Artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # 2. GitHub Pages デプロイジョブ (mainブランチプッシュ時のみ実行)
  deploy:
    needs: build-test-lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
