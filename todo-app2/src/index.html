<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium ToDo App</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <!-- Global CSS -->
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div class="app-container" id="app">
      <header>
        <h1>ToDo</h1>
        <div class="tabs-wrapper" id="tabs">
          <button class="tab-btn active" data-tab="all" id="tab-all">すべて</button>
          <button class="tab-btn" data-tab="active" id="tab-active">未完了</button>
          <button class="tab-btn" data-tab="completed" id="tab-completed">完了済み</button>
        </div>
      </header>

      <div class="actions-bar">
        <button class="btn btn-primary" id="btn-new">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          新規登録
        </button>
        <button class="btn btn-danger-outline" id="btn-delete-completed" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
          完了済を削除
        </button>
      </div>

      <main>
        <div id="todo-list-container"></div>
      </main>
    </div>

    <!-- Todo Detail Dialog Modal -->
    <dialog id="todo-detail-dialog">
      <form method="dialog" id="todo-form">
        <div class="form-group">
          <label for="todo-title">タイトル</label>
          <input type="text" id="todo-title" placeholder="何を実行しますか？" maxlength="100" autocomplete="off" required />
          <span class="counter-label" id="title-counter">0 / 100</span>
        </div>

        <div class="form-group">
          <label>日時</label>
          <div class="due-type-selector">
            <label class="due-radio-label">
              <input type="radio" id="due-none" name="due-type" value="none" checked />
              指定しない
            </label>
            <label class="due-radio-label">
              <input type="radio" id="due-date" name="due-type" value="date" />
              日だけ指定
            </label>
            <label class="due-radio-label">
              <input type="radio" id="due-datetime" name="due-type" value="datetime" />
              時間と分も指定
            </label>
          </div>
          <div class="due-picker-container">
            <div id="due-date-wrapper" class="custom-picker-wrapper" style="display: none;">
              <input type="text" id="due-date-display" placeholder="YYYY-MM-DD" readonly />
              <input type="date" id="due-date-picker" class="hidden-picker" disabled />
            </div>
            <div id="due-datetime-wrapper" class="custom-picker-wrapper" style="display: none;">
              <input type="text" id="due-datetime-display" placeholder="YYYY-MM-DD HH:mm" readonly />
              <input type="datetime-local" id="due-datetime-picker" class="hidden-picker" disabled />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>詳細</label>
          <div id="editor-container"></div>
          <span class="counter-label" id="detail-counter">0 / 2000</span>
        </div>

        <div class="modal-actions">
          <button class="btn btn-secondary" type="button" id="btn-cancel-todo">キャンセル</button>
          <button class="btn btn-primary" type="submit" id="btn-save-todo" disabled>保存</button>
        </div>
      </form>
    </dialog>

    <!-- Main Logic Bundle Entry -->
    <script type="module" src="./main.js"></script>
  </body>
</html>
