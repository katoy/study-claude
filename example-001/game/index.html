<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>落ちモノパズル - Tetris Game</title>
    <!-- Google Fonts インポート -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1b1b3a">
</head>
<body>
    <div class="container">
        <h1>🎮 落ちモノパズル</h1>
        
        <div class="game-wrapper">
            <!-- 左パネル (PC用操作説明) -->
            <div class="left-panel">
                <div class="controls-pc">
                    <p><strong>⌨️ PC操作</strong></p>
                    <p>← → : 左右移動</p>
                    <p>↑ : 回転</p>
                    <p>↓ : ソフトドロップ</p>
                    <p>SPACE : ハードドロップ</p>
                    <p>P : 一時停止</p>
                </div>
            </div>

            <!-- 中央パネル (ゲーム盤面と操作ボタン) -->
            <div class="game-area">
                <canvas id="gameCanvas" width="200" height="400"></canvas>
                <div class="status playing" id="status">ゲーム中...</div>
                
                <div class="touch-buttons">
                    <button id="btnLeft">← 左</button>
                    <button id="btnRotate">🔄 回転</button>
                    <button id="btnRight">右 →</button>
                    <button id="btnSoftDrop">↓ 落下</button>
                    <button id="btnHardDrop" class="wide-button">⬇️ ハードドロップ</button>
                    <button id="btnPause" class="wide-button">⏸ 一時停止</button>
                </div>
            </div>

            <!-- 右パネル (情報表示) -->
            <div class="info-panel">
                <div class="info-row">
                    <span class="info-label">スコア</span>
                    <span class="info-value" id="score">0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">レベル</span>
                    <span class="info-value" id="level">1</span>
                </div>
                <div class="info-row">
                    <span class="info-label">消去ライン</span>
                    <span class="info-value" id="lines">0</span>
                </div>
                <div class="next-block">
                    <div class="next-block-label">次のブロック</div>
                    <canvas id="nextCanvas" width="80" height="80"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ゲーム設定
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const BLOCK_SIZE = 20;
        const INITIAL_DROP_INTERVAL = 800; // ms
        const DROP_INTERVAL_DECREASE = 50; // ms per level
        const MOVE_DELAY = 100; // 左右長押し移動のディレイ (ms)
        const SOFT_DROP_DELAY = 50; // ソフトドロップのディレイ (ms)

        // テトロミノ定義（7種類）
        const TETROMINOS = {
            I: { shape: [[1, 1, 1, 1]], color: '#00f0f0' },
            O: { shape: [[1, 1], [1, 1]], color: '#f0f000' },
            T: { shape: [[0, 1, 0], [1, 1, 1]], color: '#a000f0' },
            S: { shape: [[0, 1, 1], [1, 1, 0]], color: '#00f000' },
            Z: { shape: [[1, 1, 0], [0, 1, 1]], color: '#f00000' },
            J: { shape: [[1, 0, 0], [1, 1, 1]], color: '#0000f0' },
            L: { shape: [[0, 0, 1], [1, 1, 1]], color: '#f0a000' }
        };

        const TETROMINO_KEYS = Object.keys(TETROMINOS);

        // ゲーム状態
        let board = [];
        let currentBlock = null;
        let nextBlock = null;
        let score = 0;
        let level = 1;
        let linesCleared = 0;
        let gameOver = false;
        let isPaused = false;
        let lastDropTime = 0;
        let elapsedTime = 0;
        let bag = [];

        // Canvas参照
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');

        // Canvasの解像度を高DPIに合わせて動的にリサイズ
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            
            // メインキャンバス
            const rect = canvas.getBoundingClientRect();
            const logicalWidth = rect.width || 200;
            const logicalHeight = rect.height || 400;
            
            canvas.width = logicalWidth * dpr;
            canvas.height = logicalHeight * dpr;
            
            const scaleX = logicalWidth / 200;
            const scaleY = logicalHeight / 400;
            ctx.scale(dpr * scaleX, dpr * scaleY);
            
            // 次ブロックキャンバス
            const nextRect = nextCanvas.getBoundingClientRect();
            const nextLogicalWidth = nextRect.width || 80;
            const nextLogicalHeight = nextRect.height || 80;
            
            nextCanvas.width = nextLogicalWidth * dpr;
            nextCanvas.height = nextLogicalHeight * dpr;
            
            const nextScaleX = nextLogicalWidth / 80;
            const nextScaleY = nextLogicalHeight / 80;
            nextCtx.scale(dpr * nextScaleX, dpr * nextScaleY);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            draw();
        });

        // 色の輝度調整（グラデーション用）
        function adjustColorBrightness(hex, percent) {
            let R = parseInt(hex.substring(1, 3), 16);
            let G = parseInt(hex.substring(3, 5), 16);
            let B = parseInt(hex.substring(5, 7), 16);

            R = parseInt(R * (100 + percent) / 100);
            G = parseInt(G * (100 + percent) / 100);
            B = parseInt(B * (100 + percent) / 100);

            R = (R < 255) ? R : 255;
            G = (G < 255) ? G : 255;
            B = (B < 255) ? B : 255;

            const rHex = R.toString(16).padStart(2, '0');
            const gHex = G.toString(16).padStart(2, '0');
            const bHex = B.toString(16).padStart(2, '0');

            return `#${rHex}${gHex}${bHex}`;
        }

        // ブロックの立体描画
        function drawBlock(context, x, y, size, color) {
            const grad = context.createLinearGradient(x, y, x + size, y + size);
            grad.addColorStop(0, adjustColorBrightness(color, 40)); // ハイライト
            grad.addColorStop(0.5, color);
            grad.addColorStop(1, adjustColorBrightness(color, -40)); // シャドウ
            
            context.fillStyle = grad;
            context.fillRect(x, y, size, size);

            // 内枠の光沢
            context.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            context.lineWidth = 1;
            context.strokeRect(x + 1, y + 1, size - 2, size - 2);

            // 外枠の影
            context.strokeStyle = 'rgba(0, 0, 0, 0.35)';
            context.lineWidth = 1;
            context.strokeRect(x, y, size, size);
        }

        // 初期化
        function init() {
            resizeCanvas();
            board = Array(BOARD_HEIGHT).fill(null).map(() => Array(BOARD_WIDTH).fill(0));
            bag = [];
            currentBlock = getRandomBlock();
            nextBlock = getRandomBlock();
            score = 0;
            level = 1;
            linesCleared = 0;
            gameOver = false;
            isPaused = false;
            lastDropTime = 0;
            elapsedTime = 0;
            updateUI();
            draw();
        }

        // ランダムなテトロミノを取得（7バッグシステム）
        function getRandomBlock() {
            if (bag.length === 0) {
                bag = [...TETROMINO_KEYS];
                // シャッフル
                for (let i = bag.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [bag[i], bag[j]] = [bag[j], bag[i]];
                }
            }
            const key = bag.pop();
            const tetromino = TETROMINOS[key];
            return {
                type: key,
                shape: JSON.parse(JSON.stringify(tetromino.shape)),
                color: tetromino.color,
                x: Math.floor((BOARD_WIDTH - tetromino.shape[0].length) / 2),
                y: 0
            };
        }

        // 衝突判定
        function canMove(block, dx, dy) {
            const newX = block.x + dx;
            const newY = block.y + dy;

            for (let r = 0; r < block.shape.length; r++) {
                for (let c = 0; c < block.shape[r].length; c++) {
                    if (block.shape[r][c]) {
                        const x = newX + c;
                        const y = newY + r;
                        if (x < 0 || x >= BOARD_WIDTH || y >= BOARD_HEIGHT) return false;
                        if (y >= 0 && board[y][x]) return false;
                    }
                }
            }
            return true;
        }

        // ブロック固定
        function fixBlock(block) {
            for (let r = 0; r < block.shape.length; r++) {
                for (let c = 0; c < block.shape[r].length; c++) {
                    if (block.shape[r][c]) {
                        const y = block.y + r;
                        const x = block.x + c;
                        if (y >= 0) {
                            board[y][x] = block.color;
                        }
                    }
                }
            }
        }

        // ライン消去
        function clearLines() {
            let linesCount = 0;
            for (let r = BOARD_HEIGHT - 1; r >= 0; r--) {
                if (board[r].every(cell => cell !== 0)) {
                    board.splice(r, 1);
                    board.unshift(Array(BOARD_WIDTH).fill(0));
                    linesCount++;
                }
            }
            if (linesCount > 0) {
                linesCleared += linesCount;
                // スコア加算（消去ラインに応じた倍率）
                const scoreMap = { 1: 100, 2: 300, 3: 500, 4: 800 };
                score += (scoreMap[linesCount] || 100) * level;
                // レベルアップ判定
                const newLevel = Math.floor(linesCleared / 10) + 1;
                if (newLevel > level) {
                    level = newLevel;
                }
            }
        }

        // 回転（壁蹴り対応）
        function rotate(block) {
            const rotated = block.shape[0].map((_, i) =>
                block.shape.map(row => row[i]).reverse()
            );
            const oldShape = block.shape;
            const oldX = block.x;
            block.shape = rotated;
            
            // 回転後の衝突判定（衝突した場合は左右にずらして配置可能か検証）
            const kicks = [0, -1, 1, -2, 2];
            let success = false;
            for (let dx of kicks) {
                if (canMove(block, dx, 0)) {
                    block.x += dx;
                    success = true;
                    break;
                }
            }
            
            if (!success) {
                block.shape = oldShape;
                block.x = oldX;
            }
        }

        // ゲームオーバー判定
        function checkGameOver() {
            if (currentBlock.y === 0) {
                for (let r = 0; r < currentBlock.shape.length; r++) {
                    for (let c = 0; c < currentBlock.shape[r].length; c++) {
                        if (currentBlock.shape[r][c]) {
                            const x = currentBlock.x + c;
                            const y = currentBlock.y + r;
                            if (board[y][x]) {
                                return true;
                            }
                        }
                    }
                }
            }
            return false;
        }

        // ブロック固定から次ブロック出現までの共通処理
        function handleBlockLock() {
            fixBlock(currentBlock);
            clearLines();
            currentBlock = nextBlock;
            nextBlock = getRandomBlock();

            if (checkGameOver()) {
                gameOver = true;
            }
            updateUI();
        }

        // 更新ロジック
        function update(deltaTime) {
            if (gameOver || isPaused) return;

            elapsedTime += deltaTime;
            const dropInterval = Math.max(100, INITIAL_DROP_INTERVAL - (level - 1) * DROP_INTERVAL_DECREASE);

            if (elapsedTime - lastDropTime > dropInterval) {
                if (canMove(currentBlock, 0, 1)) {
                    currentBlock.y++;
                } else {
                    handleBlockLock();
                }
                lastDropTime = elapsedTime;
            }
        }

        // 描画
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // グリッド線
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= BOARD_WIDTH; i++) {
                ctx.beginPath();
                ctx.moveTo(i * BLOCK_SIZE, 0);
                ctx.lineTo(i * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= BOARD_HEIGHT; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * BLOCK_SIZE);
                ctx.lineTo(canvas.width, i * BLOCK_SIZE);
                ctx.stroke();
            }

            // ボード描画
            for (let r = 0; r < BOARD_HEIGHT; r++) {
                for (let c = 0; c < BOARD_WIDTH; c++) {
                    if (board[r][c]) {
                        drawBlock(ctx, c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE, board[r][c]);
                    }
                }
            }

            // 現在のブロック描画
            if (currentBlock) {
                for (let r = 0; r < currentBlock.shape.length; r++) {
                    for (let c = 0; c < currentBlock.shape[r].length; c++) {
                        if (currentBlock.shape[r][c]) {
                            const x = currentBlock.x + c;
                            const y = currentBlock.y + r;
                            if (y >= 0) {
                                drawBlock(ctx, x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, currentBlock.color);
                            }
                        }
                    }
                }
            }

            // ゲームオーバー表示
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff3838';
                ctx.font = 'bold 20px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = '#fff';
                ctx.font = '12px Inter, sans-serif';
                ctx.fillText('スコア: ' + score, canvas.width / 2, canvas.height / 2 + 10);
                ctx.fillStyle = '#aaa';
                ctx.fillText('Enterキーか画面リロードで再開', canvas.width / 2, canvas.height / 2 + 35);
            }

            // 一時停止表示
            if (isPaused && !gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00f0f0';
                ctx.font = 'bold 22px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('一時停止中', canvas.width / 2, canvas.height / 2);
            }

            drawNextBlock();
        }

        // 次ブロック描画
        function drawNextBlock() {
            nextCtx.fillStyle = '#000';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

            if (nextBlock) {
                const blockSize = 20;
                const offsetX = (nextCanvas.width - nextBlock.shape[0].length * blockSize) / 2;
                const offsetY = (nextCanvas.height - nextBlock.shape.length * blockSize) / 2;

                for (let r = 0; r < nextBlock.shape.length; r++) {
                    for (let c = 0; c < nextBlock.shape[r].length; c++) {
                        if (nextBlock.shape[r][c]) {
                            drawBlock(
                                nextCtx,
                                offsetX + c * blockSize,
                                offsetY + r * blockSize,
                                blockSize,
                                nextBlock.color
                            );
                        }
                    }
                }
            }
        }

        // UI更新
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = linesCleared;

            const statusEl = document.getElementById('status');
            const pauseBtn = document.getElementById('btnPause');
            if (gameOver) {
                statusEl.textContent = '⚠️ ゲームオーバー！';
                statusEl.classList.remove('playing');
                // ゲームオーバー時はボタンをリスタートに変更
                if (pauseBtn) pauseBtn.textContent = '🔁 リスタート';
            } else if (isPaused) {
                statusEl.textContent = '⏸ 一時停止中';
                statusEl.classList.remove('playing');
                // 一時停止中は再開ボタン表記
                if (pauseBtn) pauseBtn.textContent = '▶️ 再開';
            } else {
                statusEl.textContent = '⚡️ プレイ中...';
                statusEl.classList.add('playing');
                // プレイ中は一時停止ボタン表記
                if (pauseBtn) pauseBtn.textContent = '⏸ 一時停止';
            }
        }

        // キーボード入力
        const keys = {};
        let lastLeftMoveTime = 0;
        let lastRightMoveTime = 0;
        let lastSoftDropTime = 0;

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                e.preventDefault(); // デフォルトのスクロール等を防止
            }

            keys[e.key] = true;

            if (gameOver) {
                if (e.key === 'Enter' && !e.repeat) {
                    init();
                }
                return;
            }

            if ((e.key === 'p' || e.key === 'P') && !e.repeat) {
                isPaused = !isPaused;
                updateUI();
                return;
            }

            if (isPaused) return;

            // 単発アクションは keydown イベント発生時に即座に実行（キーリピート時は無視）
            if (e.key === 'ArrowUp' && !e.repeat) {
                rotate(currentBlock);
            }
            if (e.key === ' ' && !e.repeat) {
                while (canMove(currentBlock, 0, 1)) {
                    currentBlock.y++;
                }
                handleBlockLock();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // ウィンドウのフォーカスが外れた際の処理
        window.addEventListener('blur', () => {
            // キー押下状態をクリア
            for (let key in keys) {
                keys[key] = false;
            }
            // プレイ中であれば自動で一時停止
            if (!gameOver && !isPaused) {
                isPaused = true;
                updateUI();
            }
        });

        // 継続的なキー入力を処理するループ
        function handleInput() {
            const now = Date.now();

            if (gameOver || isPaused) return;

            if (keys['ArrowLeft'] && now - lastLeftMoveTime > MOVE_DELAY) {
                if (canMove(currentBlock, -1, 0)) {
                    currentBlock.x--;
                    lastLeftMoveTime = now;
                }
            }
            if (keys['ArrowRight'] && now - lastRightMoveTime > MOVE_DELAY) {
                if (canMove(currentBlock, 1, 0)) {
                    currentBlock.x++;
                    lastRightMoveTime = now;
                }
            }
            if (keys['ArrowDown'] && now - lastSoftDropTime > SOFT_DROP_DELAY) {
                if (canMove(currentBlock, 0, 1)) {
                    currentBlock.y++;
                    lastSoftDropTime = now;
                }
            }
        }

        // タッチ操作用イベントハンドラ（pointerdown / click 両対応）
        const handleLeft = (e) => {
            if (e) e.preventDefault();
            if (!gameOver && !isPaused && canMove(currentBlock, -1, 0)) {
                currentBlock.x--;
            }
        };

        const handleRight = (e) => {
            if (e) e.preventDefault();
            if (!gameOver && !isPaused && canMove(currentBlock, 1, 0)) {
                currentBlock.x++;
            }
        };

        const handleRotate = (e) => {
            if (e) e.preventDefault();
            if (!gameOver && !isPaused) {
                rotate(currentBlock);
            }
        };

        const handleSoftDrop = (e) => {
            if (e) e.preventDefault();
            if (!gameOver && !isPaused && canMove(currentBlock, 0, 1)) {
                currentBlock.y++;
            }
        };

        const handleHardDrop = (e) => {
            if (e) e.preventDefault();
            if (!gameOver && !isPaused) {
                while (canMove(currentBlock, 0, 1)) {
                    currentBlock.y++;
                }
                handleBlockLock();
            }
        };

        const handlePause = (e) => {
            if (e) e.preventDefault();
            if (gameOver) {
                // ゲームオーバー時はリスタート
                init();
            } else {
                // プレイ中は一時停止・再開
                isPaused = !isPaused;
                updateUI();
            }
        };

        // イベント設定ユーティリティ
        const setupTouchEvent = (id, handler) => {
            const btn = document.getElementById(id);
            if (btn) {
                // PointerEvent をサポートしていれば pointerdown のみ、なければ click にフォールバック
                const eventName = window.PointerEvent ? 'pointerdown' : 'click';
                btn.addEventListener(eventName, handler);
            }
        };

        setupTouchEvent('btnLeft', handleLeft);
        setupTouchEvent('btnRight', handleRight);
        setupTouchEvent('btnRotate', handleRotate);
        setupTouchEvent('btnSoftDrop', handleSoftDrop);
        setupTouchEvent('btnHardDrop', handleHardDrop);
        setupTouchEvent('btnPause', handlePause);

        // ゲームループ
        let lastTime = 0;
        function gameLoop(currentTimeStamp) {
            const deltaTime = currentTimeStamp - lastTime;
            lastTime = currentTimeStamp;

            handleInput();
            update(deltaTime);
            draw();

            requestAnimationFrame(gameLoop);
        }

        // 開始
        init();
        requestAnimationFrame(gameLoop);

        // Service Worker の登録（PWA対応）
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then((reg) => console.log('[PWA] Service Worker registered scope:', reg.scope))
                    .catch((err) => console.error('[PWA] Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
