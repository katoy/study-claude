<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>落ちモノパズル - Tetris Game</title>
    <!-- Google Fonts インポート -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #1b1b3a 0%, #0d0d1e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: #fff;
        }

        /* グラスモルフィズム風のコンテナ */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 95vw;
            max-width: 850px;
            height: 95vh;
            height: 95dvh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 0;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2em;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #00f0f0, #a000f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(160, 0, 240, 0.2);
        }

        .game-wrapper {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: stretch;
            flex: 1;
            min-height: 0;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 200px;
            min-height: 0;
            justify-content: flex-start;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex: 1;
            min-height: 0;
        }

        canvas#gameCanvas {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 25px rgba(0, 240, 240, 0.15);
            image-rendering: pixelated;
            height: 100%;
            max-height: 55vh;
            max-height: 55dvh;
            width: auto;
            aspect-ratio: 1 / 2;
            display: block;
        }

        .controls-pc {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.85em;
            line-height: 1.7;
            text-align: left;
        }

        .controls-pc p {
            margin: 5px 0;
            color: #ccc;
        }
        
        .controls-pc strong {
            color: #fff;
            display: block;
            margin-bottom: 8px;
            font-size: 1.1em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 4px;
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-row {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .info-label {
            font-size: 0.75em;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-family: 'Orbitron', monospace;
            font-size: 1.8em;
            color: #00f0f0;
            text-shadow: 0 0 10px rgba(0, 240, 240, 0.3);
            font-weight: 700;
        }

        .next-block {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .next-block-label {
            font-size: 0.75em;
            color: #888;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            align-self: flex-start;
        }

        canvas#nextCanvas {
            width: 80px;
            height: 80px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.4);
            image-rendering: pixelated;
        }

        .touch-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 320px;
        }

        .touch-buttons button {
            padding: 12px 5px;
            font-size: 0.9em;
            font-weight: bold;
            background: linear-gradient(135deg, #2b2b48 0%, #171730 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s ease;
            user-select: none;
            -webkit-user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .touch-buttons button:active {
            transform: scale(0.95);
            background: linear-gradient(135deg, #171730 0%, #0d0d1e 100%);
            border-color: #00f0f0;
            box-shadow: 0 0 10px rgba(0, 240, 240, 0.4);
        }

        .wide-button {
            grid-column: 1 / -1;
        }

        .status {
            font-size: 1em;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 0 0 8px rgba(255, 107, 107, 0.3);
            text-align: center;
            min-height: 20px;
        }

        .status.playing {
            color: #00f0f0;
            text-shadow: 0 0 8px rgba(0, 240, 240, 0.3);
        }

        /* レスポンシブ調整（モバイル） */
        @media (max-width: 767px) {
            .container {
                width: 98vw;
                height: 98vh;
                height: 98dvh;
                padding: 10px;
                justify-content: flex-start;
                gap: 5px;
            }

            h1 {
                font-size: 1.4em;
                margin-bottom: 2px;
            }

            .game-wrapper {
                flex-direction: column;
                align-items: center;
                gap: 8px;
                width: 100%;
            }

            .left-panel {
                display: none; /* モバイルでは操作説明を非表示 */
            }

            /* モバイルでは情報パネルを横長にする */
            .info-panel {
                width: 100%;
                flex-direction: row;
                justify-content: space-around;
                align-items: center;
                padding: 8px 12px;
                gap: 0;
            }

            .info-row {
                align-items: center;
            }

            .info-value {
                font-size: 1.3em;
            }

            .next-block {
                border-top: none;
                padding-top: 0;
                flex-direction: row;
                align-items: center;
                gap: 8px;
            }

            .next-block-label {
                display: none; /* ラベルを非表示にして省スペース化 */
            }

            canvas#nextCanvas {
                width: 45px;
                height: 45px;
            }

            /* ゲームエリア */
            .game-area {
                width: 100%;
                justify-content: space-between;
                gap: 8px;
            }

            canvas#gameCanvas {
                max-height: calc(100vh - 240px); /* 画面の高さに応じてCanvasを動的にリサイズ */
                max-height: calc(100dvh - 240px);
                border-width: 2px;
            }

            .touch-buttons {
                max-width: 280px;
                gap: 5px;
            }

            .touch-buttons button {
                padding: 8px 4px;
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 落ちモノパズル</h1>
        
        <div class="game-wrapper">
            <!-- 左パネル (PC用操作説明) -->
            <div class="left-panel">
                <div class="controls-pc">
                    <p><strong>⌨️ PC操作</strong></p>
                    <p>← → : 左右移動</p>
                    <p>↑ : 回転</p>
                    <p>↓ : ソフトドロップ</p>
                    <p>SPACE : ハードドロップ</p>
                    <p>P : 一時停止</p>
                </div>
            </div>

            <!-- 中央パネル (ゲーム盤面と操作ボタン) -->
            <div class="game-area">
                <canvas id="gameCanvas" width="200" height="400"></canvas>
                <div class="status playing" id="status">ゲーム中...</div>
                
                <div class="touch-buttons">
                    <button id="btnLeft">← 左</button>
                    <button id="btnRotate">🔄 回転</button>
                    <button id="btnRight">右 →</button>
                    <button id="btnSoftDrop">↓ 落下</button>
                    <button id="btnHardDrop" class="wide-button">⬇️ ハードドロップ</button>
                    <button id="btnPause" class="wide-button">⏸ 一時停止</button>
                </div>
            </div>

            <!-- 右パネル (情報表示) -->
            <div class="info-panel">
                <div class="info-row">
                    <span class="info-label">スコア</span>
                    <span class="info-value" id="score">0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">レベル</span>
                    <span class="info-value" id="level">1</span>
                </div>
                <div class="info-row">
                    <span class="info-label">消去ライン</span>
                    <span class="info-value" id="lines">0</span>
                </div>
                <div class="next-block">
                    <div class="next-block-label">次のブロック</div>
                    <canvas id="nextCanvas" width="80" height="80"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ゲーム設定
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        const BLOCK_SIZE = 20;
        const INITIAL_DROP_INTERVAL = 800; // ms
        const DROP_INTERVAL_DECREASE = 50; // ms per level

        // テトロミノ定義（7種類）
        const TETROMINOS = {
            I: { shape: [[1, 1, 1, 1]], color: '#00f0f0' },
            O: { shape: [[1, 1], [1, 1]], color: '#f0f000' },
            T: { shape: [[0, 1, 0], [1, 1, 1]], color: '#a000f0' },
            S: { shape: [[0, 1, 1], [1, 1, 0]], color: '#00f000' },
            Z: { shape: [[1, 1, 0], [0, 1, 1]], color: '#f00000' },
            J: { shape: [[1, 0, 0], [1, 1, 1]], color: '#0000f0' },
            L: { shape: [[0, 0, 1], [1, 1, 1]], color: '#f0a000' }
        };

        const TETROMINO_KEYS = Object.keys(TETROMINOS);

        // ゲーム状態
        let board = [];
        let currentBlock = null;
        let nextBlock = null;
        let score = 0;
        let level = 1;
        let linesCleared = 0;
        let gameOver = false;
        let isPaused = false;
        let lastDropTime = 0;
        let currentTime = 0;

        // Canvas参照
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');

        // 色の輝度調整（グラデーション用）
        function adjustColorBrightness(hex, percent) {
            let R = parseInt(hex.substring(1, 3), 16);
            let G = parseInt(hex.substring(3, 5), 16);
            let B = parseInt(hex.substring(5, 7), 16);

            R = parseInt(R * (100 + percent) / 100);
            G = parseInt(G * (100 + percent) / 100);
            B = parseInt(B * (100 + percent) / 100);

            R = (R < 255) ? R : 255;
            G = (G < 255) ? G : 255;
            B = (B < 255) ? B : 255;

            const rHex = R.toString(16).padStart(2, '0');
            const gHex = G.toString(16).padStart(2, '0');
            const bHex = B.toString(16).padStart(2, '0');

            return `#${rHex}${gHex}${bHex}`;
        }

        // ブロックの立体描画
        function drawBlock(context, x, y, size, color) {
            const grad = context.createLinearGradient(x, y, x + size, y + size);
            grad.addColorStop(0, adjustColorBrightness(color, 40)); // ハイライト
            grad.addColorStop(0.5, color);
            grad.addColorStop(1, adjustColorBrightness(color, -40)); // シャドウ
            
            context.fillStyle = grad;
            context.fillRect(x, y, size, size);

            // 内枠の光沢
            context.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            context.lineWidth = 1;
            context.strokeRect(x + 1, y + 1, size - 2, size - 2);

            // 外枠の影
            context.strokeStyle = 'rgba(0, 0, 0, 0.35)';
            context.lineWidth = 1;
            context.strokeRect(x, y, size, size);
        }

        // 初期化
        function init() {
            board = Array(BOARD_HEIGHT).fill(null).map(() => Array(BOARD_WIDTH).fill(0));
            currentBlock = getRandomBlock();
            nextBlock = getRandomBlock();
            score = 0;
            level = 1;
            linesCleared = 0;
            gameOver = false;
            isPaused = false;
            lastDropTime = 0;
            currentTime = 0;
            updateUI();
            draw();
        }

        // ランダムなテトロミノを取得
        function getRandomBlock() {
            const key = TETROMINO_KEYS[Math.floor(Math.random() * TETROMINO_KEYS.length)];
            const tetromino = TETROMINOS[key];
            return {
                type: key,
                shape: JSON.parse(JSON.stringify(tetromino.shape)),
                color: tetromino.color,
                x: Math.floor((BOARD_WIDTH - tetromino.shape[0].length) / 2),
                y: 0
            };
        }

        // 衝突判定
        function canMove(block, dx, dy) {
            const newX = block.x + dx;
            const newY = block.y + dy;

            for (let r = 0; r < block.shape.length; r++) {
                for (let c = 0; c < block.shape[r].length; c++) {
                    if (block.shape[r][c]) {
                        const x = newX + c;
                        const y = newY + r;
                        if (x < 0 || x >= BOARD_WIDTH || y >= BOARD_HEIGHT) return false;
                        if (y >= 0 && board[y][x]) return false;
                    }
                }
            }
            return true;
        }

        // ブロック固定
        function fixBlock(block) {
            for (let r = 0; r < block.shape.length; r++) {
                for (let c = 0; c < block.shape[r].length; c++) {
                    if (block.shape[r][c]) {
                        const y = block.y + r;
                        const x = block.x + c;
                        if (y >= 0) {
                            board[y][x] = block.color;
                        }
                    }
                }
            }
        }

        // ライン消去
        function clearLines() {
            let linesCount = 0;
            for (let r = BOARD_HEIGHT - 1; r >= 0; r--) {
                if (board[r].every(cell => cell !== 0)) {
                    board.splice(r, 1);
                    board.unshift(Array(BOARD_WIDTH).fill(0));
                    linesCount++;
                }
            }
            if (linesCount > 0) {
                linesCleared += linesCount;
                // スコア加算（消去ラインに応じた倍率）
                const scoreMap = { 1: 100, 2: 300, 3: 500, 4: 800 };
                score += (scoreMap[linesCount] || 100) * level;
                // レベルアップ判定
                const newLevel = Math.floor(linesCleared / 10) + 1;
                if (newLevel > level) {
                    level = newLevel;
                }
            }
        }

        // 回転
        function rotate(block) {
            const rotated = block.shape[0].map((_, i) =>
                block.shape.map(row => row[i]).reverse()
            );
            const oldShape = block.shape;
            block.shape = rotated;
            if (!canMove(block, 0, 0)) {
                block.shape = oldShape;
            }
        }

        // ゲームオーバー判定
        function checkGameOver() {
            if (currentBlock.y === 0) {
                for (let r = 0; r < currentBlock.shape.length; r++) {
                    for (let c = 0; c < currentBlock.shape[r].length; c++) {
                        if (currentBlock.shape[r][c]) {
                            const x = currentBlock.x + c;
                            const y = currentBlock.y + r;
                            if (board[y][x]) {
                                return true;
                            }
                        }
                    }
                }
            }
            return false;
        }

        // 更新ロジック
        function update(deltaTime) {
            if (gameOver || isPaused) return;

            currentTime += deltaTime;
            const dropInterval = Math.max(100, INITIAL_DROP_INTERVAL - (level - 1) * DROP_INTERVAL_DECREASE);

            if (currentTime - lastDropTime > dropInterval) {
                if (canMove(currentBlock, 0, 1)) {
                    currentBlock.y++;
                } else {
                    fixBlock(currentBlock);
                    clearLines();
                    currentBlock = nextBlock;
                    nextBlock = getRandomBlock();

                    if (checkGameOver()) {
                        gameOver = true;
                    }
                }
                lastDropTime = currentTime;
            }
        }

        // 描画
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // グリッド線
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= BOARD_WIDTH; i++) {
                ctx.beginPath();
                ctx.moveTo(i * BLOCK_SIZE, 0);
                ctx.lineTo(i * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= BOARD_HEIGHT; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * BLOCK_SIZE);
                ctx.lineTo(canvas.width, i * BLOCK_SIZE);
                ctx.stroke();
            }

            // ボード描画
            for (let r = 0; r < BOARD_HEIGHT; r++) {
                for (let c = 0; c < BOARD_WIDTH; c++) {
                    if (board[r][c]) {
                        drawBlock(ctx, c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE, board[r][c]);
                    }
                }
            }

            // 現在のブロック描画
            if (currentBlock) {
                for (let r = 0; r < currentBlock.shape.length; r++) {
                    for (let c = 0; c < currentBlock.shape[r].length; c++) {
                        if (currentBlock.shape[r][c]) {
                            const x = currentBlock.x + c;
                            const y = currentBlock.y + r;
                            if (y >= 0) {
                                drawBlock(ctx, x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, currentBlock.color);
                            }
                        }
                    }
                }
            }

            // ゲームオーバー表示
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff3838';
                ctx.font = 'bold 20px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = '#fff';
                ctx.font = '12px Inter, sans-serif';
                ctx.fillText('スコア: ' + score, canvas.width / 2, canvas.height / 2 + 10);
                ctx.fillStyle = '#aaa';
                ctx.fillText('Enterキーか画面リロードで再開', canvas.width / 2, canvas.height / 2 + 35);
            }

            // 一時停止表示
            if (isPaused && !gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00f0f0';
                ctx.font = 'bold 22px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('一時停止中', canvas.width / 2, canvas.height / 2);
            }

            drawNextBlock();
        }

        // 次ブロック描画
        function drawNextBlock() {
            nextCtx.fillStyle = '#000';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

            if (nextBlock) {
                const blockSize = 20;
                const offsetX = (nextCanvas.width - nextBlock.shape[0].length * blockSize) / 2;
                const offsetY = (nextCanvas.height - nextBlock.shape.length * blockSize) / 2;

                for (let r = 0; r < nextBlock.shape.length; r++) {
                    for (let c = 0; c < nextBlock.shape[r].length; c++) {
                        if (nextBlock.shape[r][c]) {
                            drawBlock(
                                nextCtx,
                                offsetX + c * blockSize,
                                offsetY + r * blockSize,
                                blockSize,
                                nextBlock.color
                            );
                        }
                    }
                }
            }
        }

        // UI更新
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = linesCleared;

            const statusEl = document.getElementById('status');
            if (gameOver) {
                statusEl.textContent = '⚠️ ゲームオーバー！';
                statusEl.classList.remove('playing');
            } else if (isPaused) {
                statusEl.textContent = '⏸ 一時停止中';
                statusEl.classList.remove('playing');
            } else {
                statusEl.textContent = '⚡️ プレイ中...';
                statusEl.classList.add('playing');
            }
        }

        // キーボード入力
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault();
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // キー処理
        let lastInputTime = 0;
        function handleInput() {
            const now = Date.now();
            const inputDelay = 100; // ms

            if (gameOver) {
                if (keys['Enter'] && now - lastInputTime > 200) {
                    init();
                    lastInputTime = now;
                }
                return;
            }

            if (keys['p'] || keys['P']) {
                if (now - lastInputTime > 200) {
                    isPaused = !isPaused;
                    lastInputTime = now;
                    updateUI();
                }
                return;
            }

            if (isPaused) return;

            if (keys['ArrowLeft'] && now - lastInputTime > inputDelay) {
                if (canMove(currentBlock, -1, 0)) {
                    currentBlock.x--;
                    lastInputTime = now;
                }
            }
            if (keys['ArrowRight'] && now - lastInputTime > inputDelay) {
                if (canMove(currentBlock, 1, 0)) {
                    currentBlock.x++;
                    lastInputTime = now;
                }
            }
            if (keys['ArrowUp'] && now - lastInputTime > inputDelay) {
                rotate(currentBlock);
                lastInputTime = now;
            }
            if (keys['ArrowDown']) {
                if (canMove(currentBlock, 0, 1)) {
                    currentBlock.y++;
                }
            }
            if (keys[' '] && now - lastInputTime > inputDelay) {
                while (canMove(currentBlock, 0, 1)) {
                    currentBlock.y++;
                }
                lastInputTime = now;
            }
        }

        // タッチボタンイベント
        document.getElementById('btnLeft').addEventListener('click', () => {
            if (!gameOver && !isPaused && canMove(currentBlock, -1, 0)) {
                currentBlock.x--;
            }
        });

        document.getElementById('btnRight').addEventListener('click', () => {
            if (!gameOver && !isPaused && canMove(currentBlock, 1, 0)) {
                currentBlock.x++;
            }
        });

        document.getElementById('btnRotate').addEventListener('click', () => {
            if (!gameOver && !isPaused) {
                rotate(currentBlock);
            }
        });

        document.getElementById('btnSoftDrop').addEventListener('click', () => {
            if (!gameOver && !isPaused && canMove(currentBlock, 0, 1)) {
                currentBlock.y++;
            }
        });

        document.getElementById('btnHardDrop').addEventListener('click', () => {
            if (!gameOver && !isPaused) {
                while (canMove(currentBlock, 0, 1)) {
                    currentBlock.y++;
                }
            }
        });

        document.getElementById('btnPause').addEventListener('click', () => {
            if (!gameOver) {
                isPaused = !isPaused;
                updateUI();
            }
        });

        // ゲームループ
        let lastTime = 0;
        function gameLoop(currentTimeStamp) {
            const deltaTime = currentTimeStamp - lastTime;
            lastTime = currentTimeStamp;

            handleInput();
            update(deltaTime);
            draw();
            updateUI();

            requestAnimationFrame(gameLoop);
        }

        // 開始
        init();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
